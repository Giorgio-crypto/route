<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route Planner V4</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root{
      --bg:#0b1220; --panel:#111827; --card:#172033; --line:#243047;
      --text:#fff; --muted:#9fb0c8; --blue:#2563eb; --gray:#475569;
      --green:#16a34a; --red:#dc2626; --orange:#d97706;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{display:grid;grid-template-columns:390px 1fr;min-height:100vh}
    .left{padding:12px;background:var(--panel);border-right:1px solid var(--line)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:12px}
    .top{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .stat{background:#0b1324;border:1px solid var(--line);border-radius:14px;padding:10px}
    .lab{font-size:12px;color:var(--muted)}
    .val{font-size:22px;font-weight:700}
    input,button{font:inherit}
    input{width:100%;padding:13px;border-radius:14px;border:1px solid #314055;background:#0b1324;color:#fff;box-sizing:border-box}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    button{padding:12px;border:0;border-radius:12px;color:#fff;font-weight:700;cursor:pointer}
    .b1{background:var(--blue)} .b2{background:var(--gray)} .b3{background:var(--green)}
    .b4{background:var(--red)} .b5{background:var(--orange)}
    #status{margin-top:10px;padding:10px;background:#0f1b31;border:1px solid #243047;border-radius:12px;color:#dbe7fb;font-size:14px}
    .resultsBox,.stopsBox{display:flex;flex-direction:column;gap:8px;margin-top:10px}
    .sectionLabel{font-size:12px;color:var(--muted);margin-top:6px;margin-bottom:4px}
    .item{padding:10px;border-radius:14px;background:#0b1324;border:1px solid #243047}
    .clickable{cursor:pointer}
    .name{font-weight:700;margin-bottom:4px}
    .addr{font-size:12px;color:var(--muted);line-height:1.35}
    .tagRow{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .tag{padding:5px 9px;border-radius:999px;background:#1d2a44;border:1px solid #243047;font-size:11px}
    .smallrow{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:8px}
    .mini{padding:8px;border-radius:10px;font-size:12px}
    #map{height:100vh}
    .heroTitle{font-size:24px;font-weight:700;margin:0 0 6px}
    .heroSub{font-size:14px;color:var(--muted);line-height:1.4;margin:0}
    @media (max-width:900px){
      .wrap{grid-template-columns:1fr}
      #map{height:60vh}
      .smallrow{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <div class="card">
      <div class="heroTitle">Route Planner V4</div>
      <div class="heroSub">Ricerca intelligente: prima rubrica, poi online. Ogni tappa nuova aggiorna automaticamente la tua rubrica.</div>
    </div>

    <div class="top">
      <div class="stat"><div class="lab">Tappe</div><div class="val" id="statStops">0</div></div>
      <div class="stat"><div class="lab">Km</div><div class="val" id="statKm">0.0</div></div>
    </div>

    <div class="card">
      <div style="font-weight:700;margin-bottom:10px">Ricerca</div>
      <input id="query" placeholder="Es. Brembo Stezzano oppure Via Roma 1 Milano">
      <div class="row">
        <button class="b1" id="btnSearch">Cerca</button>
        <button class="b2" id="btnClearResults">Pulisci</button>
      </div>
      <div id="status">Pronto.</div>
      <div id="results" class="resultsBox"></div>
    </div>

    <div class="card">
      <div style="font-weight:700;margin-bottom:10px">Tappe</div>
      <div class="row">
        <button class="b3" id="btnOptimize">Ottimizza</button>
        <button class="b2" id="btnRecalc">Ricalcola</button>
      </div>
      <div class="row">
        <button class="b5" id="btnSave">Salva</button>
        <button class="b4" id="btnReset">Nuovo</button>
      </div>
      <div id="stops" class="stopsBox"></div>
    </div>
  </div>

  <div id="map"></div>
</div>

<script>
const STORAGE_TRIP = "rp_v4_trip";
const STORAGE_BOOK = "rp_v4_book";

let stops = [];
let totalKm = 0;
let totalMin = 0;
let routeGeo = null;
let smartBook = [];

const qEl = document.getElementById("query");
const statusEl = document.getElementById("status");
const resultsEl = document.getElementById("results");
const stopsEl = document.getElementById("stops");
const statStopsEl = document.getElementById("statStops");
const statKmEl = document.getElementById("statKm");

const map = L.map("map").setView([45.1847, 9.1582], 8);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

const markersLayer = L.layerGroup().addTo(map);
let routeLayer = null;

function setStatus(msg, ok=true){
  statusEl.textContent = msg;
  statusEl.style.color = ok ? "#dbe7fb" : "#ffd1d1";
  statusEl.style.background = ok ? "#0f1b31" : "#2a1111";
}

function saveAll(){
  localStorage.setItem(STORAGE_TRIP, JSON.stringify({stops,totalKm,totalMin,routeGeo}));
  localStorage.setItem(STORAGE_BOOK, JSON.stringify(smartBook));
}

function loadAll(){
  try{
    const t = JSON.parse(localStorage.getItem(STORAGE_TRIP) || "{}");
    stops = Array.isArray(t.stops) ? t.stops : [];
    totalKm = typeof t.totalKm === "number" ? t.totalKm : 0;
    totalMin = typeof t.totalMin === "number" ? t.totalMin : 0;
    routeGeo = t.routeGeo || null;
  }catch(e){}
  try{
    const b = JSON.parse(localStorage.getItem(STORAGE_BOOK) || "[]");
    smartBook = Array.isArray(b) ? b : [];
  }catch(e){}
}

function esc(s){
  return String(s).replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}

function fmtMin(min){
  const h = Math.floor(min/60);
  const m = Math.round(min%60);
  return `${h}h ${String(m).padStart(2,"0")}m`;
}

function clearResults(){
  resultsEl.innerHTML = "";
  setStatus("Risultati puliti.");
}

function updateStats(){
  statStopsEl.textContent = stops.length;
  statKmEl.textContent = totalKm.toFixed(1);
}

function renderMap(){
  markersLayer.clearLayers();
  if(routeLayer){
    map.removeLayer(routeLayer);
    routeLayer = null;
  }

  stops.forEach((s,i) => {
    L.marker([s.lat,s.lon]).addTo(markersLayer)
      .bindPopup(`<b>${i+1}. ${esc(s.name)}</b><br>${esc(s.address)}`);
  });

  if(routeGeo){
    routeLayer = L.geoJSON({type:"Feature", geometry:routeGeo, properties:{}},{
      style:{color:"#2563eb",weight:5}
    }).addTo(map);
    try{ map.fitBounds(routeLayer.getBounds(), {padding:[20,20]}); }catch(e){}
  } else if(stops.length){
    const bounds = L.latLngBounds(stops.map(s => [s.lat,s.lon]));
    if(bounds.isValid()) map.fitBounds(bounds, {padding:[20,20]});
  }
}

function renderStops(){
  stopsEl.innerHTML = "";
  if(!stops.length){
    stopsEl.innerHTML = `<div class="item">Nessuna tappa.</div>`;
    return;
  }

  stops.forEach((s,i) => {
    const leg = (i < stops.length-1 && typeof s.legKm === "number")
      ? `<div class="tag">${s.legKm.toFixed(1)} km</div><div class="tag">${fmtMin(s.legMin || 0)}</div>`
      : "";
    const html = `
      <div class="item">
        <div class="name">${i+1}. ${esc(s.name)}</div>
        <div class="addr">${esc(s.address)}</div>
        <div class="tagRow">
          ${i===0 ? `<div class="tag">Partenza</div>` : ""}
          ${i===stops.length-1 ? `<div class="tag">Arrivo</div>` : ""}
          ${leg}
        </div>
        <div class="smallrow">
          <button class="mini b2" onclick="moveUp(${i})">Su</button>
          <button class="mini b2" onclick="moveDown(${i})">Giù</button>
          <button class="mini b1" onclick="navigateTo(${i})">Naviga</button>
          <button class="mini b4" onclick="removeStop(${i})">Del</button>
        </div>
      </div>
    `;
    stopsEl.insertAdjacentHTML("beforeend", html);
  });
}

function renderAll(){
  updateStats();
  renderStops();
  renderMap();
  saveAll();
}

function normalizeText(s){
  return String(s || "").toLowerCase().trim();
}

function scoreBookItem(item, query){
  const q = normalizeText(query);
  const n = normalizeText(item.name);
  const a = normalizeText(item.address);
  let score = 0;
  if(n.startsWith(q)) score += 100;
  if(n.includes(q)) score += 50;
  if(a.includes(q)) score += 20;
  score += (item.useCount || 0) * 5;
  return score;
}

function searchInBook(query){
  const q = normalizeText(query);
  if(q.length < 2) return [];
  return smartBook
    .map(item => ({...item, _score: scoreBookItem(item, q)}))
    .filter(item => item._score > 0)
    .sort((a,b) => b._score - a._score || (b.useCount||0) - (a.useCount||0))
    .slice(0,5);
}

function renderSearchSections(bookResults, webResults){
  resultsEl.innerHTML = "";

  if(bookResults.length){
    resultsEl.insertAdjacentHTML("beforeend", `<div class="sectionLabel">Rubrica intelligente</div>`);
    bookResults.forEach(item => {
      resultsEl.insertAdjacentHTML("beforeend", `
        <div class="item clickable" onclick="addStopFromSearch('${js(item.name)}','${js(item.address)}','${item.lat}','${item.lon}', true)">
          <div class="name">${esc(item.name)}</div>
          <div class="addr">${esc(item.address)}</div>
          <div class="tagRow">
            <div class="tag">Rubrica</div>
            <div class="tag">Usato ${item.useCount || 0} volte</div>
          </div>
        </div>
      `);
    });
  }

  if(webResults.length){
    resultsEl.insertAdjacentHTML("beforeend", `<div class="sectionLabel">Nuovi risultati</div>`);
    webResults.forEach(item => {
      resultsEl.insertAdjacentHTML("beforeend", `
        <div class="item clickable" onclick="addStopFromSearch('${js(item.name)}','${js(item.address)}','${item.lat}','${item.lon}', false)">
          <div class="name">${esc(item.name)}</div>
          <div class="addr">${esc(item.address)}</div>
          <div class="tagRow"><div class="tag">Online</div></div>
        </div>
      `);
    });
  }

  if(!bookResults.length && !webResults.length){
    resultsEl.innerHTML = `<div class="item">Nessun risultato.</div>`;
    setStatus("Nessun risultato trovato.", false);
    return;
  }

  setStatus("Tocca il risultato corretto.");
}

function js(s){
  return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'");
}

async function searchOnline(query){
  const url = "https://nominatim.openstreetmap.org/search?format=jsonv2&limit=8&q=" + encodeURIComponent(query);
  const res = await fetch(url, {headers:{Accept:"application/json"}});
  if(!res.ok) throw new Error("search");
  const data = await res.json();
  return (data || []).map(item => ({
    name: (item.display_name || "Risultato").split(",")[0],
    address: item.display_name,
    lat: Number(item.lat),
    lon: Number(item.lon)
  }));
}

async function runSearch(){
  const query = qEl.value.trim();
  if(query.length < 2){
    setStatus("Scrivi almeno 2 lettere.", false);
    return;
  }

  setStatus("Ricerca in corso...");
  const bookResults = searchInBook(query);

  try{
    const webResults = await searchOnline(query);
    const filteredWeb = webResults.filter(w =>
      !bookResults.some(b =>
        normalizeText(b.name) === normalizeText(w.name) &&
        normalizeText(b.address) === normalizeText(w.address)
      )
    );
    renderSearchSections(bookResults, filteredWeb);
  }catch(e){
    renderSearchSections(bookResults, []);
    if(bookResults.length){
      setStatus("Online non disponibile, ti mostro la rubrica.");
    } else {
      setStatus("Errore durante la ricerca online.", false);
    }
  }
}

function updateSmartBook(name, address, lat, lon){
  const idx = smartBook.findIndex(x =>
    normalizeText(x.name) === normalizeText(name) &&
    normalizeText(x.address) === normalizeText(address)
  );

  if(idx >= 0){
    smartBook[idx].useCount = (smartBook[idx].useCount || 0) + 1;
    smartBook[idx].lastUsed = Date.now();
    smartBook[idx].lat = Number(lat);
    smartBook[idx].lon = Number(lon);
  } else {
    smartBook.unshift({
      id: String(Date.now() + Math.random()),
      name,
      address,
      lat: Number(lat),
      lon: Number(lon),
      useCount: 1,
      lastUsed: Date.now()
    });
  }

  smartBook.sort((a,b) => (b.useCount||0) - (a.useCount||0) || (b.lastUsed||0) - (a.lastUsed||0));
  smartBook = smartBook.slice(0,300);
}

async function addStopFromSearch(name, address, lat, lon, fromBook){
  stops.push({
    id: String(Date.now() + Math.random()),
    name,
    address,
    lat: Number(lat),
    lon: Number(lon)
  });

  updateSmartBook(name, address, lat, lon);

  qEl.value = "";
  clearResults();
  renderAll();
  await recalcRoute();
  setStatus(fromBook ? "Tappa aggiunta dalla rubrica." : "Tappa aggiunta e salvata in rubrica.");
}

async function recalcRoute(){
  if(stops.length < 2){
    totalKm = 0;
    totalMin = 0;
    routeGeo = null;
    stops = stops.map(s => ({...s, legKm:undefined, legMin:undefined}));
    renderAll();
    return;
  }

  try{
    setStatus("Calcolo percorso...");
    const coords = stops.map(s => `${s.lon},${s.lat}`).join(";");
    const url = `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson&steps=false`;
    const res = await fetch(url);
    const data = await res.json();
    if(!data.routes || !data.routes.length) throw new Error("route");

    const route = data.routes[0];
    totalKm = route.distance / 1000;
    totalMin = route.duration / 60;
    routeGeo = route.geometry;

    stops = stops.map((s,i) => ({
      ...s,
      legKm: route.legs[i] ? route.legs[i].distance / 1000 : undefined,
      legMin: route.legs[i] ? route.legs[i].duration / 60 : undefined
    }));

    renderAll();
    setStatus("Percorso aggiornato.");
  }catch(e){
    setStatus("Errore nel percorso.", false);
  }
}

async function optimizeRoute(){
  if(stops.length < 3){
    setStatus("Servono almeno 3 tappe.", false);
    return;
  }

  try{
    setStatus("Ottimizzazione...");
    const coords = stops.map(s => `${s.lon},${s.lat}`).join(";");
    const url = `https://router.project-osrm.org/trip/v1/driving/${coords}?source=first&destination=last&roundtrip=false&steps=false&overview=false`;
    const res = await fetch(url);
    const data = await res.json();
    if(!data.waypoints || !data.waypoints.length) throw new Error("trip");

    const current = stops.slice();
    const order = data.waypoints.slice()
      .sort((a,b) => a.waypoint_index - b.waypoint_index)
      .map(w => w.trips_index);

    stops = order.map(i => current[i]);
    await recalcRoute();
    setStatus("Ordine ottimizzato.");
  }catch(e){
    setStatus("Errore ottimizzazione.", false);
  }
}

function moveUp(i){
  if(i <= 0) return;
  [stops[i-1], stops[i]] = [stops[i], stops[i-1]];
  recalcRoute();
}

function moveDown(i){
  if(i >= stops.length - 1) return;
  [stops[i+1], stops[i]] = [stops[i], stops[i+1]];
  recalcRoute();
}

function removeStop(i){
  stops.splice(i,1);
  recalcRoute();
}

function navigateTo(i){
  const s = stops[i];
  if(!s) return;
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lon}`, "_blank");
}

function saveTrip(){
  saveAll();
  setStatus("Viaggio salvato.");
}

function resetTrip(){
  if(!confirm("Vuoi cancellare il viaggio attuale?")) return;
  stops = [];
  totalKm = 0;
  totalMin = 0;
  routeGeo = null;
  clearResults();
  renderAll();
  setStatus("Nuovo viaggio pronto.");
}

document.getElementById("btnSearch").addEventListener("click", runSearch);
document.getElementById("btnClearResults").addEventListener("click", clearResults);
document.getElementById("btnOptimize").addEventListener("click", optimizeRoute);
document.getElementById("btnRecalc").addEventListener("click", recalcRoute);
document.getElementById("btnSave").addEventListener("click", saveTrip);
document.getElementById("btnReset").addEventListener("click", resetTrip);

qEl.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    runSearch();
  }
});

let debounceTimer = null;
qEl.addEventListener("input", () => {
  clearTimeout(debounceTimer);
  const value = qEl.value.trim();
  if(value.length < 2){
    resultsEl.innerHTML = "";
    return;
  }
  debounceTimer = setTimeout(runSearch, 350);
});

loadAll();
renderAll();
if(stops.length >= 2) recalcRoute();
</script>
</body>
</html>
