.
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const STORAGE_STATE = "route_planner_state_v3";
    const STORAGE_CLIENTS = "route_planner_clients_v3";
    const STORAGE_TRIPS = "route_planner_trips_v3";

    const state = {
      stops: [],
      routeMode: "manuale",
      totalKm: 0,
      totalMin: 0,
      routeGeo: null
    };

    let clients = [];
    let trips = [];

    const els = {
      searchInput: document.getElementById("searchInput"),
      suggestions: document.getElementById("suggestions"),
      status: document.getElementById("status"),
      stopList: document.getElementById("stopList"),
      btnOptimize: document.getElementById("btnOptimize"),
      btnRecalc: document.getElementById("btnRecalc"),
      btnSaveCurrentTrip: document.getElementById("btnSaveCurrentTrip"),
      btnReset: document.getElementById("btnReset"),
      statStops: document.getElementById("statStops"),
      statKm: document.getElementById("statKm"),
      statTime: document.getElementById("statTime"),
      statMode: document.getElementById("statMode"),
      pillMode: document.getElementById("pillMode"),
      pillKm: document.getElementById("pillKm"),
      pillTime: document.getElementById("pillTime"),
      pillClients: document.getElementById("pillClients"),
      pillTrips: document.getElementById("pillTrips"),

      clientName: document.getElementById("clientName"),
      clientAddress: document.getElementById("clientAddress"),
      btnAddClientManual: document.getElementById("btnAddClientManual"),
      btnShowClients: document.getElementById("btnShowClients"),
      clientResults: document.getElementById("clientResults"),

      tripName: document.getElementById("tripName"),
      btnSaveNamedTrip: document.getElementById("btnSaveNamedTrip"),
      btnShowTrips: document.getElementById("btnShowTrips"),
      tripResults: document.getElementById("tripResults")
    };

    function formatMinutes(min){
      const h = Math.floor(min / 60);
      const m = Math.round(min % 60);
      return `${h}h ${String(m).padStart(2,"0")}m`;
    }

    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, s => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        "\"":"&quot;",
        "'":"&#039;"
      }[s]));
    }

    function uid(){
      return (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()));
    }

    function setStatus(msg, ok=true){
      els.status.textContent = msg;
      els.status.style.background = ok ? "rgba(22,163,74,.12)" : "rgba(220,38,38,.12)";
      els.status.style.borderColor = ok ? "rgba(22,163,74,.25)" : "rgba(220,38,38,.25)";
      els.status.style.color = ok ? "#d1fae5" : "#fecaca";
    }

    function saveAll(){
      localStorage.setItem(STORAGE_STATE, JSON.stringify(state));
      localStorage.setItem(STORAGE_CLIENTS, JSON.stringify(clients));
      localStorage.setItem(STORAGE_TRIPS, JSON.stringify(trips));
    }

    function loadAll(){
      try{
        const rawState = localStorage.getItem(STORAGE_STATE);
        if(rawState){
          const parsed = JSON.parse(rawState);
          if(Array.isArray(parsed.stops)) state.stops = parsed.stops;
          if(parsed.routeMode) state.routeMode = parsed.routeMode;
          if(typeof parsed.totalKm === "number") state.totalKm = parsed.totalKm;
          if(typeof parsed.totalMin === "number") state.totalMin = parsed.totalMin;
          if(parsed.routeGeo) state.routeGeo = parsed.routeGeo;
        }
      }catch(e){}

      try{
        const rawClients = localStorage.getItem(STORAGE_CLIENTS);
        if(rawClients) clients = JSON.parse(rawClients) || [];
      }catch(e){ clients = []; }

      try{
        const rawTrips = localStorage.getItem(STORAGE_TRIPS);
        if(rawTrips) trips = JSON.parse(rawTrips) || [];
      }catch(e){ trips = []; }
    }

    const map = L.map("map", { zoomControl:true }).setView([45.1847, 9.1582], 8);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const markersLayer = L.layerGroup().addTo(map);
    let routeLayer = null;
    let searchTimer = null;
    let dragIndex = null;

    function updateSummary(){
      els.statStops.textContent = state.stops.length;
      els.statKm.textContent = state.totalKm.toFixed(1);
      els.statTime.textContent = formatMinutes(state.totalMin);
      els.statMode.textContent = state.routeMode;
      els.pillMode.textContent = state.routeMode;
      els.pillKm.textContent = state.totalKm.toFixed(1);
      els.pillTime.textContent = formatMinutes(state.totalMin);
      els.pillClients.textContent = clients.length;
      els.pillTrips.textContent = trips.length;
    }

    function renderStops(){
      els.stopList.innerHTML = "";

      if(!state.stops.length){
        els.stopList.innerHTML = `<div class="empty">Nessuna tappa ancora.<br>Scrivi il nome di un'azienda o un indirizzo e scegli il risultato corretto.</div>`;
        return;
      }

      state.stops.forEach((stop, index) => {
        const legKm = typeof stop.legKm === "number" ? stop.legKm.toFixed(1) : null;
        const legMin = typeof stop.legMin === "number" ? formatMinutes(stop.legMin) : null;

        const div = document.createElement("div");
        div.className = "stop";
        div.draggable = true;
        div.dataset.index = index;

        div.innerHTML = `
          <div class="stop-head">
            <div class="idx">${index + 1}</div>
            <div>
              <div class="stop-name">${escapeHtml(stop.name)}</div>
              <div class="stop-addr">${escapeHtml(stop.address)}</div>
            </div>
          </div>

          <div class="chips">
            ${index < state.stops.length - 1 && legKm ? `<div class="chip">${legKm} km</div>` : ""}
            ${index < state.stops.length - 1 && legMin ? `<div class="chip">${legMin}</div>` : ""}
            ${index === 0 ? `<div class="chip">Partenza</div>` : ""}
            ${index === state.stops.length - 1 ? `<div class="chip">Arrivo</div>` : ""}
          </div>

          <div class="stop-actions">
            <button class="mini gray" data-action="up" data-index="${index}">Su</button>
            <button class="mini gray" data-action="down" data-index="${index}">Giù</button>
            <button class="mini blue" data-action="nav" data-index="${index}">Naviga</button>
            <button class="mini green" data-action="saveclient" data-index="${index}">Cliente</button>
            <button class="mini red" data-action="del" data-index="${index}">Elimina</button>
          </div>
        `;
        els.stopList.appendChild(div);
      });
    }

    function renderMap(){
      markersLayer.clearLayers();

      state.stops.forEach((stop, index) => {
        const marker = L.marker([stop.lat, stop.lon]).addTo(markersLayer);
        marker.bindPopup(`<b>${index + 1}. ${escapeHtml(stop.name)}</b><br>${escapeHtml(stop.address)}`);
      });

      if(routeLayer){
        map.removeLayer(routeLayer);
        routeLayer = null;
      }

      if(state.routeGeo){
        routeLayer = L.geoJSON({ type:"Feature", geometry: state.routeGeo, properties:{} }, {
          style: { color:"#2563eb", weight:6, opacity:.95 }
        }).addTo(map);

        try{
          map.fitBounds(routeLayer.getBounds(), { padding:[24,24] });
        }catch(e){}
      } else if(state.stops.length){
        const bounds = L.latLngBounds(state.stops.map(s => [s.lat, s.lon]));
        if(bounds.isValid()) map.fitBounds(bounds, { padding:[24,24] });
      }
    }

    function renderClients(){
      els.clientResults.innerHTML = "";

      if(!clients.length){
        els.clientResults.innerHTML = `<div class="client-item"><div class="c-name">Nessun cliente salvato</div><div class="c-addr">Aggiungi un cliente manualmente o da una tappa.</div></div>`;
      } else {
        els.clientResults.innerHTML = clients.map((c, i) => `
          <div class="client-item" data-index="${i}">
            <div class="c-name">${escapeHtml(c.name)}</div>
            <div class="c-addr">${escapeHtml(c.address)}</div>
            <div style="display:flex;gap:8px;margin-top:8px;">
              <button class="mini blue" data-client-action="addstop" data-index="${i}">Usa</button>
              <button class="mini red" data-client-action="delete" data-index="${i}">Elimina</button>
            </div>
          </div>
        `).join("");
      }

      els.clientResults.style.display = "block";
    }

    function renderTrips(){
      els.tripResults.innerHTML = "";

      if(!trips.length){
        els.tripResults.innerHTML = `<div class="trip-item"><div class="t-name">Nessun viaggio salvato</div><div class="t-meta">Salva il viaggio corrente con un nome.</div></div>`;
      } else {
        els.tripResults.innerHTML = trips.map((t, i) => `
          <div class="trip-item" data-index="${i}">
            <div class="t-name">${escapeHtml(t.name)}</div>
            <div class="t-meta">${t.stops.length} tappe · ${t.totalKm.toFixed(1)} km · ${formatMinutes(t.totalMin)}</div>
            <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
              <button class="mini blue" data-trip-action="load" data-index="${i}">Apri</button>
              <button class="mini orange" data-trip-action="duplicate" data-index="${i}">Duplica</button>
              <button class="mini red" data-trip-action="delete" data-index="${i}">Elimina</button>
            </div>
          </div>
        `).join("");
      }

      els.tripResults.style.display = "block";
    }

    function renderAll(){
      updateSummary();
      renderStops();
      renderMap();
      renderClients();
      renderTrips();
      saveAll();
    }

    async function searchSuggestions(query){
      if(query.trim().length < 3){
        els.suggestions.style.display = "none";
        els.suggestions.innerHTML = "";
        return;
      }

      try{
        setStatus("Ricerca in corso...");
        const url = new URL("https://nominatim.openstreetmap.org/search");
        url.searchParams.set("q", query.trim());
        url.searchParams.set("format", "jsonv2");
        url.searchParams.set("limit", "8");
        url.searchParams.set("addressdetails", "1");

        const res = await fetch(url.toString(), { headers:{ "Accept":"application/json" } });
        if(!res.ok) throw new Error("Errore ricerca");
        const data = await res.json();

        if(!data.length){
          els.suggestions.style.display = "none";
          els.suggestions.innerHTML = "";
          setStatus("Nessun risultato. Prova con più dettagli.", false);
          return;
        }

        els.suggestions.innerHTML = data.map((item, i) => {
          const name = (item.display_name || "Risultato").split(",")[0];
          return `
            <div class="suggestion" data-lat="${item.lat}" data-lon="${item.lon}" data-name="${escapeHtml(name)}" data-address="${escapeHtml(item.display_name)}">
              <div class="s-name">${escapeHtml(name)}</div>
              <div class="s-addr">${escapeHtml(item.display_name)}</div>
            </div>
          `;
        }).join("");

        els.suggestions.style.display = "block";
        setStatus("Seleziona il risultato corretto.");
      }catch(e){
        setStatus("Errore durante la ricerca.", false);
      }
    }

    async function addStop(name, address, lat, lon){
      const stop = {
        id: uid(),
        name,
        address,
        lat: Number(lat),
        lon: Number(lon)
      };

      state.stops.push(stop);
      state.routeMode = "manuale";
      els.searchInput.value = "";
      els.suggestions.style.display = "none";
      els.suggestions.innerHTML = "";
      renderAll();
      await calculateRoute();
      setStatus("Tappa aggiunta.");
    }

    async function calculateRoute(){
      if(state.stops.length < 2){
        state.totalKm = 0;
        state.totalMin = 0;
        state.routeGeo = null;
        state.stops = state.stops.map(s => ({ ...s, legKm: undefined, legMin: undefined }));
        renderAll();
        return;
      }

      try{
        setStatus("Calcolo percorso stradale reale...");
        const coords = state.stops.map(s => `${s.lon},${s.lat}`).join(";");
        const url = `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson&steps=false`;
        const res = await fetch(url);
        const data = await res.json();

        if(!data.routes || !data.routes.length) throw new Error("Nessun percorso");

        const route = data.routes[0];
        state.totalKm = route.distance / 1000;
        state.totalMin = route.duration / 60;
        state.routeGeo = route.geometry;

        state.stops = state.stops.map((s, i) => ({
          ...s,
          legKm: route.legs[i] ? (route.legs[i].distance / 1000) : undefined,
          legMin: route.legs[i] ? (route.legs[i].duration / 60) : undefined
        }));

        renderAll();
        setStatus("Percorso aggiornato.");
      }catch(e){
        setStatus("Errore nel calcolo del percorso.", false);
      }
    }

    async function optimizeRoute(){
      if(state.stops.length < 3){
        setStatus("Per ottimizzare servono almeno 3 tappe.", false);
        return;
      }

      try{
        setStatus("Ottimizzazione in corso...");
        const coords = state.stops.map(s => `${s.lon},${s.lat}`).join(";");
        const url = `https://router.project-osrm.org/trip/v1/driving/${coords}?source=first&destination=last&roundtrip=false&steps=false&overview=false`;
        const res = await fetch(url);
        const data = await res.json();

        if(!data.waypoints || !data.waypoints.length) throw new Error("Errore ottimizzazione");

        const currentStops = [...state.stops];
        const order = [...data.waypoints]
          .sort((a,b) => a.waypoint_index - b.waypoint_index)
          .map(w => w.trips_index);

        state.stops = order.map(i => currentStops[i]);
        state.routeMode = "ottimizzato";

        await calculateRoute();
        setStatus("Ordine ottimizzato.");
      }catch(e){
        setStatus("Ottimizzazione non riuscita.", false);
      }
    }

    function resetTrip(){
      if(!confirm("Vuoi cancellare il viaggio attuale?")) return;
      state.stops = [];
      state.routeMode = "manuale";
      state.totalKm = 0;
      state.totalMin = 0;
      state.routeGeo = null;
      renderAll();
      setStatus("Nuovo viaggio pronto.");
    }

    function openNavigation(stop){
      const url = `https://www.google.com/maps/dir/?api=1&destination=${stop.lat},${stop.lon}`;
      window.open(url, "_blank");
    }

    function addClientManual(){
      const name = els.clientName.value.trim();
      const address = els.clientAddress.value.trim();

      if(!name || !address){
        setStatus("Inserisci nome cliente e indirizzo.", false);
        return;
      }

      clients.unshift({
        id: uid(),
        name,
        address
      });

      els.clientName.value = "";
      els.clientAddress.value = "";
      renderAll();
      setStatus("Cliente salvato in rubrica.");
    }

    function saveStopAsClient(index){
      const stop = state.stops[index];
      if(!stop) return;

      const exists = clients.some(c => c.name === stop.name && c.address === stop.address);
      if(exists){
        setStatus("Cliente già presente in rubrica.", false);
        return;
      }

      clients.unshift({
        id: uid(),
        name: stop.name,
        address: stop.address
      });

      renderAll();
      setStatus("Tappa salvata in rubrica clienti.");
    }

    async function addClientToStops(index){
      const client = clients[index];
      if(!client) return;

      try{
        setStatus("Geocodifica cliente...");
        const url = new URL("https://nominatim.openstreetmap.org/search");
        url.searchParams.set("q", client.address);
        url.searchParams.set("format", "jsonv2");
        url.searchParams.set("limit", "1");

        const res = await fetch(url.toString(), { headers:{ "Accept":"application/json" } });
        const data = await res.json();

        if(!data.length){
          setStatus("Indirizzo cliente non trovato.", false);
          return;
        }

        await addStop(client.name, client.address, data[0].lat, data[0].lon);
        setStatus("Cliente aggiunto come tappa.");
      }catch(e){
        setStatus("Errore aggiunta cliente.", false);
      }
    }

    function deleteClient(index){
      if(index < 0 || index >= clients.length) return;
      clients.splice(index, 1);
      renderAll();
      setStatus("Cliente eliminato.");
    }

    function saveNamedTrip(){
      const name = els.tripName.value.trim();
      if(!name){
        setStatus("Inserisci un nome viaggio.", false);
        return;
      }
      if(!state.stops.length){
        setStatus("Non ci sono tappe da salvare.", false);
        return;
      }

      const trip = {
        id: uid(),
        name,
        savedAt: new Date().toISOString(),
        stops: JSON.parse(JSON.stringify(state.stops)),
        routeMode: state.routeMode,
        totalKm: state.totalKm,
        totalMin: state.totalMin,
        routeGeo: state.routeGeo
      };

      trips.unshift(trip);
      els.tripName.value = "";
      renderAll();
      setStatus("Viaggio salvato.");
    }

    function saveCurrentTripQuick(){
      const autoName = `Viaggio ${new Date().toLocaleString("it-IT")}`;
      if(!state.stops.length){
        setStatus("Non ci sono tappe da salvare.", false);
        return;
      }

      trips.unshift({
        id: uid(),
        name: autoName,
        savedAt: new Date().toISOString(),
        stops: JSON.parse(JSON.stringify(state.stops)),
        routeMode: state.routeMode,
        totalKm: state.totalKm,
        totalMin: state.totalMin,
        routeGeo: state.routeGeo
      });

      renderAll();
      setStatus("Viaggio salvato rapidamente.");
    }

    function loadTrip(index){
      const trip = trips[index];
      if(!trip) return;

      state.stops = JSON.parse(JSON.stringify(trip.stops));
      state.routeMode = trip.routeMode || "manuale";
      state.totalKm = trip.totalKm || 0;
      state.totalMin = trip.totalMin || 0;
      state.routeGeo = trip.routeGeo || null;

      renderAll();
      setStatus("Viaggio caricato.");
    }

    function duplicateTrip(index){
      const trip = trips[index];
      if(!trip) return;

      trips.unshift({
        ...JSON.parse(JSON.stringify(trip)),
        id: uid(),
        name: trip.name + " copia",
        savedAt: new Date().toISOString()
      });

      renderAll();
      setStatus("Viaggio duplicato.");
    }

    function deleteTrip(index){
      if(index < 0 || index >= trips.length) return;
      trips.splice(index, 1);
      renderAll();
      setStatus("Viaggio eliminato.");
    }

    els.searchInput.addEventListener("input", () => {
      clearTimeout(searchTimer);
      const q = els.searchInput.value;
      searchTimer = setTimeout(() => searchSuggestions(q), 350);
    });

    els.searchInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        const first = els.suggestions.querySelector(".suggestion");
        if(first) first.click();
      }
    });

    els.suggestions.addEventListener("click", async (e) => {
      const item = e.target.closest(".suggestion");
      if(!item) return;
      await addStop(
        item.dataset.name,
        item.dataset.address,
        item.dataset.lat,
        item.dataset.lon
      );
    });

    els.btnOptimize.addEventListener("click", optimizeRoute);
    els.btnRecalc.addEventListener("click", calculateRoute);
    els.btnSaveCurrentTrip.addEventListener("click", saveCurrentTripQuick);
    els.btnReset.addEventListener("click", resetTrip);

    els.btnAddClientManual.addEventListener("click", addClientManual);
    els.btnShowClients.addEventListener("click", () => {
      els.clientResults.style.display = els.clientResults.style.display === "block" ? "none" : "block";
      if(els.clientResults.style.display === "block") renderClients();
    });

    els.btnSaveNamedTrip.addEventListener("click", saveNamedTrip);
    els.btnShowTrips.addEventListener("click", () => {
      els.tripResults.style.display = els.tripResults.style.display === "block" ? "none" : "block";
      if(els.tripResults.style.display === "block") renderTrips();
    });

    els.clientResults.addEventListener("click", async (e) => {
      const btn = e.target.closest("button");
      if(!btn) return;
      const index = Number(btn.dataset.index);
      const action = btn.dataset.clientAction;

      if(action === "addstop") await addClientToStops(index);
      if(action === "delete") deleteClient(index);
    });

    els.tripResults.addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if(!btn) return;
      const index = Number(btn.dataset.index);
      const action = btn.dataset.tripAction;

      if(action === "load") loadTrip(index);
      if(action === "duplicate") duplicateTrip(index);
      if(action === "delete") deleteTrip(index);
    });

    els.stopList.addEventListener("click", async (e) => {
      const btn = e.target.closest("button");
      if(!btn) return;

      const index = Number(btn.dataset.index);
      const action = btn.dataset.action;

      if(Number.isNaN(index) || !state.stops[index]) return;

      if(action === "del"){
        state.stops.splice(index, 1);
        state.routeMode = "manuale";
        await calculateRoute();
      }

      if(action === "up" && index > 0){
        [state.stops[index - 1], state.stops[index]] = [state.stops[index], state.stops[index - 1]];
        state.routeMode = "manuale";
        await calculateRoute();
      }

      if(action === "down" && index < state.stops.length - 1){
        [state.stops[index + 1], state.stops[index]] = [state.stops[index], state.stops[index + 1]];
        state.routeMode = "manuale";
        await calculateRoute();
      }

      if(action === "nav"){
        openNavigation(state.stops[index]);
      }

      if(action === "saveclient"){
        saveStopAsClient(index);
      }
    });

    els.stopList.addEventListener("dragstart", (e) => {
      arresto costiero = e.target.closest (".stop");const stop = e.target.closest(".stop");
      if(!stop) return;
      dragIndex = Number(stop.dataset.index);
      stop.classList.add("dragging");
    });

    els.stopList.addEventListener("dragend", (e) => {
       const stop = e.target.closest(".stop");
      if(stop) stop.classList.remove("dragging");
    });

    els.stopList.addEventListener("dragover", (e) => {
       prevenire l'inadempimento .prevenire il default();
    });

      se(!bersaglio || indice di trascinamento === null) return;

      Const indice di caduta = Number(target.dataset.index);
      if(Number.isNaN(indice di caduta) || dragIndex === dropIndex) return;

      const Trasferimento = state.stops.splice(dragIndex, 1)[0];
      state.stops.splice(indice di caduta , 0Modalità percorso, mosso;

      state .Mode di rotta = "manuale";

      Status di set("Ordine aggiornato con drag & drop.");
    });

    carica tutto();
    Resa di tutti i();

    se(Stato.Fermata .lunghezza >= 2){
      Calcolo del percorso();
    } altro {
      Status di set("Pronto. Scrivi almeno 3 lettere per cercare.");
    }
  </script>
