<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route Planner Base</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#0b1220;color:#fff}
    .wrap{display:grid;grid-template-columns:380px 1fr;min-height:100vh}
    .left{padding:12px;background:#111827;border-right:1px solid #243047}
    .card{background:#172033;border:1px solid #243047;border-radius:16px;padding:12px;margin-bottom:12px}
    input,button{font:inherit}
    input{width:100%;padding:12px;border-radius:12px;border:1px solid #314055;background:#0b1324;color:#fff;margin-bottom:10px;box-sizing:border-box}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    button{padding:12px;border:0;border-radius:12px;color:#fff;font-weight:700;cursor:pointer}
    .b1{background:#2563eb}.b2{background:#475569}.b3{background:#16a34a}.b4{background:#dc2626}
    #status{margin-top:10px;padding:10px;border-radius:12px;background:#0f1b31;color:#cbd5e1;font-size:14px}
    #results,#stops{display:flex;flex-direction:column;gap:8px;margin-top:10px}
    .item{padding:10px;border-radius:12px;background:#0b1324;border:1px solid #243047}
    .name{font-weight:700;margin-bottom:4px}
    .addr{font-size:12px;color:#9fb0c8}
    .smallrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px}
    .mini{padding:8px;border-radius:10px;font-size:12px}
    #map{height:100vh}
    .top{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .stat{background:#172033;border:1px solid #243047;border-radius:14px;padding:10px}
    .lab{font-size:12px;color:#9fb0c8}
    .val{font-size:22px;font-weight:700}
    @media (max-width:900px){
      .wrap{grid-template-columns:1fr}
      #map{height:60vh}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <div class="top">
      <div class="stat"><div class="lab">Tappe</div><div class="val" id="statStops">0</div></div>
      <div class="stat"><div class="lab">Km</div><div class="val" id="statKm">0.0</div></div>
    </div>

    <div class="card">
      <div style="font-weight:700;margin-bottom:10px">Ricerca</div>
      <input id="query" placeholder="Es. Via Roma 1 Milano oppure IKEA Corsico">
      <div class="row">
        <button class="b1" onclick="searchPlaces()">Cerca</button>
        <button class="b2" onclick="clearResults()">Pulisci</button>
      </div>
      <div id="status">Pronto.</div>
      <div id="results"></div>
    </div>

    <div class="card">
      <div style="font-weight:700;margin-bottom:10px">Tappe</div>
      <div class="row">
        <button class="b3" onclick="optimizeRoute()">Ottimizza</button>
        <button class="b2" onclick="recalcRoute()">Ricalcola</button>
      </div>
      <div class="row" style="margin-top:8px">
        <button class="b2" onclick="saveTrip()">Salva</button>
        <button class="b4" onclick="resetTrip()">Nuovo</button>
      </div>
      <div id="stops"></div>
    </div>
  </div>

  <div id="map"></div>
</div>

<script>
var STORAGE_KEY = "route_planner_base_ok";
var stops = [];
var totalKm = 0;
var routeGeo = null;

var map = L.map('map').setView([45.1847, 9.1582], 8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markersLayer = L.layerGroup().addTo(map);
var routeLayer = null;

function setStatus(msg){
  document.getElementById('status').textContent = msg;
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    stops: stops,
    totalKm: totalKm,
    routeGeo: routeGeo
  }));
}

function loadState(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    var obj = JSON.parse(raw);
    stops = obj.stops || [];
    totalKm = obj.totalKm || 0;
    routeGeo = obj.routeGeo || null;
  }catch(e){}
}

function clearResults(){
  document.getElementById('results').innerHTML = '';
  setStatus('Risultati puliti.');
}

function updateStats(){
  document.getElementById('statStops').textContent = stops.length;
  document.getElementById('statKm').textContent = Number(totalKm).toFixed(1);
}

function renderStops(){
  var box = document.getElementById('stops');
  box.innerHTML = '';
  if(!stops.length){
    box.innerHTML = '<div class="item">Nessuna tappa.</div>';
    return;
  }
  for(var i=0;i<stops.length;i++){
    var s = stops[i];
    var html = '<div class="item">';
    html += '<div class="name">' + (i+1) + '. ' + escapeHtml(s.name) + '</div>';
    html += '<div class="addr">' + escapeHtml(s.address) + '</div>';
    if(i < stops.length-1 && s.legKm){
      html += '<div class="addr" style="margin-top:6px">→ ' + s.legKm.toFixed(1) + ' km</div>';
    }
    html += '<div class="smallrow">';
    html += '<button class="mini b2" onclick="moveUp(' + i + ')">Su</button>';
    html += '<button class="mini b1" onclick="navigateTo(' + i + ')">Naviga</button>';
    html += '<button class="mini b4" onclick="removeStop(' + i + ')">Del</button>';
    html += '</div></div>';
    box.innerHTML += html;
  }
}

function renderMap(){
  markersLayer.clearLayers();
  if(routeLayer){
    map.removeLayer(routeLayer);
    routeLayer = null;
  }

  for(var i=0;i<stops.length;i++){
    var s = stops[i];
    L.marker([s.lat, s.lon]).addTo(markersLayer)
      .bindPopup('<b>' + (i+1) + '. ' + escapeHtml(s.name) + '</b><br>' + escapeHtml(s.address));
  }

  if(routeGeo){
    routeLayer = L.geoJSON({type:'Feature', geometry: routeGeo, properties:{}}, {
      style:{color:'#2563eb', weight:5}
    }).addTo(map);
    try{ map.fitBounds(routeLayer.getBounds(), {padding:[20,20]}); }catch(e){}
  } else if(stops.length){
    var bounds = L.latLngBounds(stops.map(function(s){ return [s.lat, s.lon]; }));
    if(bounds.isValid()) map.fitBounds(bounds, {padding:[20,20]});
  }
}

function renderAll(){
  updateStats();
  renderStops();
  renderMap();
  saveState();
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m];
  });
}

async function searchPlaces(){
  var q = document.getElementById('query').value.trim();
  if(q.length < 3){
    setStatus('Scrivi almeno 3 lettere.');
    return;
  }
  setStatus('Ricerca in corso...');
  try{
    var url = 'https://nominatim.openstreetmap.org/search?format=jsonv2&limit=8&q=' + encodeURIComponent(q);
    var res = await fetch(url, {headers:{'Accept':'application/json'}});
    if(!res.ok) throw new Error('http');
    var data = await res.json();
    var box = document.getElementById('results');
    box.innerHTML = '';
    if(!data.length){
      setStatus('Nessun risultato.');
      return;
    }
    for(var i=0;i<data.length;i++){
      var item = data[i];
      var name = (item.display_name || 'Risultato').split(',')[0];
      var html = '<div class="item" onclick="addStopFromResult(' +
        '\'' + encodeJs(name) + '\',' +
        '\'' + encodeJs(item.display_name || name) + '\',' +
        '\'' + item.lat + '\',' +
        '\'' + item.lon + '\'' +
      ')">';
      html += '<div class="name">' + escapeHtml(name) + '</div>';
      html += '<div class="addr">' + escapeHtml(item.display_name || '') + '</div>';
      html += '</div>';
      box.innerHTML += html;
    }
    setStatus('Tocca un risultato per aggiungerlo.');
  }catch(e){
    setStatus('Errore durante la ricerca.');
  }
}

function encodeJs(str){
  return String(str).replace(/\\/g,'\\\\').replace(/'/g,\"\\\\'\");
}

async function addStopFromResult(name, address, lat, lon){
  stops.push({
    id: String(Date.now() + Math.random()),
    name: name,
    address: address,
    lat: Number(lat),
    lon: Number(lon)
  });
  document.getElementById('query').value = '';
  clearResults();
  renderAll();
  await recalcRoute();
  setStatus('Tappa aggiunta.');
}

async function recalcRoute(){
  if(stops.length < 2){
    totalKm = 0;
    routeGeo = null;
    for(var i=0;i<stops.length;i++) stops[i].legKm = undefined;
    renderAll();
    return;
  }
  try{
    setStatus('Calcolo percorso...');
    var coords = stops.map(function(s){ return s.lon + ',' + s.lat; }).join(';');
    var url = 'https://router.project-osrm.org/route/v1/driving/' + coords + '?overview=full&geometries=geojson&steps=false';
    var res = await fetch(url);
    var data = await res.json();
    if(!data.routes || !data.routes.length) throw new Error('route');
    var route = data.routes[0];
    totalKm = route.distance / 1000;
    routeGeo = route.geometry;
    for(var i=0;i<stops.length;i++){
      stops[i].legKm = route.legs[i] ? (route.legs[i].distance / 1000) : undefined;
    }
    renderAll();
    setStatus('Percorso aggiornato.');
  }catch(e){
    setStatus('Errore nel percorso.');
  }
}

async function optimizeRoute(){
  if(stops.length < 3){
    setStatus('Servono almeno 3 tappe.');
    return;
  }
  try{
    setStatus('Ottimizzazione...');
    var coords = stops.map(function(s){ return s.lon + ',' + s.lat; }).join(';');
    var url = 'https://router.project-osrm.org/trip/v1/driving/' + coords + '?source=first&destination=last&roundtrip=false&steps=false&overview=false';
    var res = await fetch(url);
    var data = await res.json();
    if(!data.waypoints || !data.waypoints.length) throw new Error('trip');
    var current = stops.slice();
    var order = data.waypoints.slice().sort(function(a,b){
      return a.waypoint_index - b.waypoint_index;
    }).map(function(w){ return w.trips_index; });
    stops = order.map(function(i){ return current[i]; });
    await recalcRoute();
    Status di Set((.);
  }catch(e){
    Status di set("Errore di ottimizzazione".);
  }
}

Funzione {)lmovimento verso l'alto
   se(I(se) Ritorno;
   var  tmp = arresto[I - 1];
   si ferma[I -1] = arresto[I];
  stops[i] = tmp;
  ricalc Route();
}

Funzione FunzioneStop(I){
  stops.splice(i,1);
  ricalc Route();
}

ricalc Navigazione di percorso verso(i){
  var s = se[I];
  se(!s) return;
  window.open('https://www.google.com/maps/dir/?api=1&destination=' + s.lat + ',' + s.lon, '_blank');
}

Funzione saveTrip(){
  saveState();
  setStatus('Viaggio salvato.');
}

Funzione resetTrip(){
  if(!confirm('Vuoi cancellare il viaggio attuale?')) return;
  stops = [];
  totalKm = 0;
  routeGeo = null;
  clearResults();
  renderAll();
  setStatus('Nuovo viaggio pronto.');
}

Stato di carico();
Resa di tutti i();
se(Fermata.Lunghezza >= 2) ricalc Route();
</script>
</body>
</html>
