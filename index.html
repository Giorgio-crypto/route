<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test JS</title>
  <style>
    body{font-family:Arial,sans-serif;background:#111;color:#fff;padding:20px}
    button{padding:14px 18px;font-size:18px;border:0;border-radius:12px;background:#2563eb;color:#fff}
    #out{margin-top:20px;padding:14px;background:#222;border-radius:12px}
  </style>
</head>
<body>
  <h1>Test JavaScript</h1>
  <button onclick="prova()">Premi qui</button>
  <div id="out">Se il bottone funziona, qui compare il messaggio.</div>

  <script>
    function prova(){
      document.getElementById('out').textContent = 'FUNZIONA';
      alert('JavaScript OK');
    }
  </script>
</body>
</html>
